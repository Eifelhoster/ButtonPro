<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Background transparent -->
  <!-- Cartoon character (simplified monitor/computer with face) -->
  <g transform="translate(4,8)">
    <!-- Monitor body -->
    <rect x="2" y="2" width="52" height="40" rx="6" ry="6" fill="#6ab023" stroke="#4a8010" stroke-width="2"/>
    <!-- Screen -->
    <rect x="8" y="8" width="40" height="26" rx="3" ry="3" fill="#e8f5d0"/>
    <!-- Eyes -->
    <circle cx="20" cy="20" r="4" fill="#6ab023" stroke="#4a8010" stroke-width="1.5"/>
    <circle cx="36" cy="20" r="4" fill="#6ab023" stroke="#4a8010" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="2" fill="white"/>
    <circle cx="36" cy="20" r="2" fill="white"/>
    <!-- Smile -->
    <path d="M 18 28 Q 28 35 38 28" fill="none" stroke="#4a8010" stroke-width="2" stroke-linecap="round"/>
    <!-- Stand -->
    <rect x="20" y="42" width="16" height="6" fill="#6ab023"/>
    <rect x="12" y="47" width="32" height="5" rx="2" fill="#4a8010"/>
    <!-- Hands/arms -->
    <path d="M 2 18 Q -6 22 -4 30" fill="none" stroke="#6ab023" stroke-width="3" stroke-linecap="round"/>
    <path d="M 54 18 Q 62 22 60 30" fill="none" stroke="#6ab023" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- eifelhoster.de text -->
  <text x="78" y="34" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6ab023">eifelhoster.de</text>
  <!-- Tagline -->
  <text x="78" y="54" font-family="Arial, sans-serif" font-size="13" fill="#555">Deine Homepage in <tspan text-decoration="underline">guten</tspan> Händen</text>
</svg>
